<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

    <title>FORMULARIOS</title>
  </head>
  <body>
    
    <div class="container">
        <br>
        <h3 class="bg-info" style="text-align: center;">Ejemplo de formulario</h3>
        <br>
        <form>
        <div class="form-group">
        <label for="FormControl">Email:</label>
        <input type="email" class="form-control"
        id="FormControl" placeholder="nombre@dominio">
        </div>
        <br>
        <div class="form-group">
            <label for="FormControl">Nombre:</label>
            <input type="text" class="form-control-md"
            id="FormControl" placeholder="nombre">
            </div>
        <br>
        <div class="form-group">
            <label for="FormControl">Contraseña:</label>
            <input type="password" class="form-control-sm"
            id="FormControl" placeholder="Password">
            </div>
        <br>
        <label for="FormControl">Elige una opcion:</label>
        <select class="form-control" id="FormControl">
            <option>opcion 1</option>
            <option>opcion 2</option>
            <option>opcion 3</option>
            <option>opcion 4</option>
        </select>
        <br>
        <label for="FormControl">Selecciona:</label>
        <div class="form-check">
            <input class="form-check-input"
            type="checkbox" value="1" id="uno">
            <label class="form-check-label" for="uno">
            Opción uno
            </label>
            </div>
            <div class="form-check">
                <input class="form-check-input"
                type="checkbox" value="2" id="dos">
                <label class="form-check-label" for="dos">
                Opción dos
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input"
                type="checkbox" value="3" id="tres">
                <label class="form-check-label" for="tres">
                Opción tres
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input"
                type="checkbox" value="4" id="cuatro">
                <label class="form-check-label" for="cuatro">
                Opción cuatro
                </label>
            </div>
            <br>
            <button type="submit" class="btn btn-danger btn-block">Enviar</button>
        </form>
        </div>

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
  </body>
</html>
